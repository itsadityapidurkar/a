<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I'm Sorry 💕</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: linear-gradient(135deg, #1a0a0a 0%, #2d1414 25%, #1a0a0a 50%, #2d1414 75%, #1a0a0a 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Floating Hearts Background */
        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            font-size: 20px;
            color: rgba(255, 192, 203, 0.6);
            animation: fall linear infinite, sway ease-in-out infinite;
            opacity: 0;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes sway {
            0%, 100% {
                margin-left: 0;
            }
            50% {
                margin-left: 30px;
            }
        }

        /* Main Content */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px;
        }

        .button-area {
            position: relative;
            width: min(420px, 90vw);
            height: 180px;
            margin: 50px auto 0;
        }

        .rose {
            font-size: 100px;
            animation: pulse 2s ease-in-out infinite;
            display: inline-block;
            margin-bottom: 20px;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        .sorry-text {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(60px, 15vw, 150px);
            color: #ffb6c1;
            text-shadow: 0 0 50px rgba(255, 182, 193, 0.6),
                         0 0 100px rgba(255, 182, 193, 0.3);
            animation: fadeInUp 1.5s ease-out;
            line-height: 1.2;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            font-size: clamp(18px, 4vw, 28px);
            color: rgba(255, 255, 255, 0.8);
            margin-top: 20px;
            font-weight: 300;
            letter-spacing: 2px;
            animation: fadeInUp 1.5s ease-out 0.3s both;
        }

        /* Forgive Button */
        .forgive-btn {
            background: linear-gradient(135deg, #ff6b9d, #ff8fab);
            border: none;
            padding: 20px 60px;
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.4);
            animation: btnFloat 3s ease-in-out infinite, fadeInUp 1.5s ease-out 0.6s both;
            position: absolute;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
            white-space: nowrap;
        }

        @keyframes btnFloat {
            0%, 100% {
                transform: translateX(-50%) translateY(0);
            }
            50% {
                transform: translateX(-50%) translateY(-10px);
            }
        }

        .forgive-btn:hover {
            transform: translateX(-50%) scale(1.1);
            box-shadow: 0 15px 50px rgba(255, 107, 157, 0.6);
        }

        .no-btn {
            position: fixed;
            left: 50%;
            top: calc(50% + 90px);
            transform: translateX(-50%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.08);
            color: white;
            padding: 16px 34px;
            border-radius: 50px;
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            cursor: pointer;
            white-space: nowrap;
            transition: left 0.25s ease, top 0.25s ease, transform 0.25s ease, background 0.25s ease;
            backdrop-filter: blur(6px);
            animation: fadeInUp 1.5s ease-out 0.9s both;
            user-select: none;
            z-index: 10;
        }

        .no-btn:hover {
            background: rgba(255, 255, 255, 0.16);
        }

        /* Response Overlay */
        .response-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.5s ease;
        }

        .response-overlay.show {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .response-content {
            text-align: center;
            animation: scaleIn 0.5s ease;
        }

        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        .response-emoji {
            font-size: 150px;
            margin-bottom: 30px;
        }

        .response-text {
            font-family: 'Great Vibes', cursive;
            font-size: 50px;
            color: #ffb6c1;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .button-area {
                height: 170px;
            }

            .rose {
                font-size: 70px;
            }

            .forgive-btn {
                padding: 18px 50px;
                font-size: 20px;
            }

            .no-btn {
                padding: 14px 28px;
                font-size: 18px;
                top: 88px;
            }
        }
    </style>
</head>
<body>
    <!-- Floating Hearts -->
    <div class="hearts-container" id="heartsContainer"></div>

    <div class="container">
        <div class="rose">🌹</div>
        <h1 class="sorry-text">I'm Sorry</h1>
        <p class="subtitle">Sorrryyyyyy nishuuuuuuuuuuuuuuuuuuuuuuuuuuuu</p>

        <div class="button-area" id="buttonArea">
            <button class="forgive-btn" onclick="showResponse()">
                💗 Forgive Me? 💗
            </button>

            <button class="no-btn" id="noBtn" type="button" onmouseenter="moveButton(event)" onpointerdown="blockNope(event)" onmousedown="blockNope(event)" ontouchstart="blockNope(event)" onclick="blockNope(event)" onfocus="handleNoButtonFocus()">
                ❌ Don't Forgive
            </button>
        </div>
    </div>

    <!-- Response Overlay -->
    <div class="response-overlay" id="responseOverlay" onclick="hideResponse()">
        <div class="response-content">
            <div class="response-emoji">💖</div>
            <p class="response-text">I love you so much! 💕</p>
        </div>
    </div>

    <script>
        // Create floating hearts
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = ['💗', '💖', '💕', '❤️', '💓'][Math.floor(Math.random() * 5)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
            heart.style.animationDuration = (Math.random() * 5 + 8) + 's';
            heart.style.animationDelay = (Math.random() * 5) + 's';
            heart.style.opacity = Math.random() * 0.5 + 0.3;

            document.getElementById('heartsContainer').appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 13000);
        }

        // Create hearts continuously
        setInterval(createHeart, 500);

        // Show response
        function showResponse() {
            document.getElementById('responseOverlay').classList.add('show');
        }

        function hideResponse() {
            document.getElementById('responseOverlay').classList.remove('show');
        }

        // Add some initial hearts
        for (let i = 0; i < 20; i++) {
            setTimeout(createHeart, i * 200);
        }

        function getPointerPosition(event) {
            if (!event) {
                return null;
            }

            if ('touches' in event && event.touches.length > 0) {
                return {
                    x: event.touches[0].clientX,
                    y: event.touches[0].clientY
                };
            }

            if (typeof event.clientX === 'number' && typeof event.clientY === 'number') {
                return {
                    x: event.clientX,
                    y: event.clientY
                };
            }

            return null;
        }

        function positionNoButton(left, top) {
            const noBtn = document.getElementById('noBtn');
            noBtn.style.left = `${left}px`;
            noBtn.style.top = `${top}px`;
            noBtn.style.transform = 'none';
        }

        function setInitialNoButtonPosition() {
            const noBtn = document.getElementById('noBtn');
            const forgiveBtn = document.querySelector('.forgive-btn');
            const forgiveRect = forgiveBtn.getBoundingClientRect();
            const left = Math.max(16, (window.innerWidth - noBtn.offsetWidth) / 2);
            const top = Math.min(window.innerHeight - noBtn.offsetHeight - 16, forgiveRect.bottom + 24);

            positionNoButton(left, top);
        }

        function moveButton(event) {
            const noBtn = document.getElementById('noBtn');
            const maxLeft = Math.max(16, window.innerWidth - noBtn.offsetWidth - 16);
            const maxTop = Math.max(16, window.innerHeight - noBtn.offsetHeight - 16);
            const pointer = getPointerPosition(event);
            let left = 16 + (Math.random() * (maxLeft - 16));
            let top = 16 + (Math.random() * (maxTop - 16));

            if (pointer) {
                const minDistance = Math.min(220, Math.max(140, noBtn.offsetWidth));

                for (let attempt = 0; attempt < 18; attempt++) {
                    const candidateLeft = 16 + (Math.random() * (maxLeft - 16));
                    const candidateTop = 16 + (Math.random() * (maxTop - 16));
                    const centerX = candidateLeft + (noBtn.offsetWidth / 2);
                    const centerY = candidateTop + (noBtn.offsetHeight / 2);

                    if (Math.hypot(centerX - pointer.x, centerY - pointer.y) >= minDistance) {
                        left = candidateLeft;
                        top = candidateTop;
                        break;
                    }

                    left = candidateLeft;
                    top = candidateTop;
                }
            }

            positionNoButton(left, top);
        }

        function blockNope(event) {
            event.preventDefault();
            event.stopPropagation();
            moveButton(event);
            return false;
        }

        function handleNoButtonFocus() {
            document.getElementById('noBtn').blur();
            moveButton();
        }

        function dodgePointer(event) {
            const noBtn = document.getElementById('noBtn');
            const rect = noBtn.getBoundingClientRect();
            const centerX = rect.left + (rect.width / 2);
            const centerY = rect.top + (rect.height / 2);
            const distance = Math.hypot(centerX - event.clientX, centerY - event.clientY);

            if (distance < 110) {
                moveButton(event);
            }
        }

        window.addEventListener('load', setInitialNoButtonPosition);
        window.addEventListener('resize', setInitialNoButtonPosition);
        document.addEventListener('mousemove', dodgePointer);
    </script>
</body>
</html>
