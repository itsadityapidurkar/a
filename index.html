<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I'm Sorry 💕</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: linear-gradient(135deg, #1a0a0a 0%, #2d1414 25%, #1a0a0a 50%, #2d1414 75%, #1a0a0a 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Floating Hearts Background */
        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            font-size: 20px;
            color: rgba(255, 192, 203, 0.6);
            animation: fall linear infinite, sway ease-in-out infinite;
            opacity: 0;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes sway {
            0%, 100% {
                margin-left: 0;
            }
            50% {
                margin-left: 30px;
            }
        }

        /* Main Content */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px;
        }

        .rose {
            font-size: 100px;
            animation: pulse 2s ease-in-out infinite;
            display: inline-block;
            margin-bottom: 20px;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        .sorry-text {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(60px, 15vw, 150px);
            color: #ffb6c1;
            text-shadow: 0 0 50px rgba(255, 182, 193, 0.6),
                         0 0 100px rgba(255, 182, 193, 0.3);
            animation: fadeInUp 1.5s ease-out;
            line-height: 1.2;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            font-size: clamp(18px, 4vw, 28px);
            color: rgba(255, 255, 255, 0.8);
            margin-top: 20px;
            font-weight: 300;
            letter-spacing: 2px;
            animation: fadeInUp 1.5s ease-out 0.3s both;
        }

        /* Forgive Button */
        .forgive-btn {
            background: linear-gradient(135deg, #ff6b9d, #ff8fab);
            border: none;
            padding: 20px 60px;
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.4);
            animation: btnFloat 3s ease-in-out infinite, fadeInUp 1.5s ease-out 0.6s both;
        }

        @keyframes btnFloat {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .forgive-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 50px rgba(255, 107, 157, 0.6);
        }

        /* Response Overlay */
        .response-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.5s ease;
        }

        .response-overlay.show {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .response-content {
            text-align: center;
            animation: scaleIn 0.5s ease;
        }

        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        .response-emoji {
            font-size: 150px;
            margin-bottom: 30px;
        }

        .response-text {
            font-family: 'Great Vibes', cursive;
            font-size: 50px;
            color: #ffb6c1;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .rose {
                font-size: 70px;
            }
            .forgive-btn {
                padding: 18px 50px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Floating Hearts -->
    <div class="hearts-container" id="heartsContainer"></div>

    <div class="container">
        <div class="rose">🌹</div>
        <h1 class="sorry-text">I'm Sorry</h1>
        <p class="subtitle">Sorrryyyyyy nishuuuuuuuuuuuuuuuuuuuuuuuuuuuu</p>

        <button class="forgive-btn" onclick="showResponse()">
            💗 Forgive Me? 💗
        </button>

        <button class="no-btn" id="noBtn" onmouseover="moveButton()" onclick="tryMoveButton()">
            ❌ Don't Forgive
        </button>
    </div>

    <!-- Response Overlay -->
    <div class="response-overlay" id="responseOverlay" onclick="hideResponse()">
        <div class="response-content">
            <div class="response-emoji">💖</div>
            <p class="response-text">I love you so much! 💕</p>
        </div>
    </div>

    <script>
        // Create floating hearts
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = ['💗', '💖', '💕', '❤️', '💓'][Math.floor(Math.random() * 5)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
            heart.style.animationDuration = (Math.random() * 5 + 8) + 's';
            heart.style.animationDelay = (Math.random() * 5) + 's';
            heart.style.opacity = Math.random() * 0.5 + 0.3;

            document.getElementById('heartsContainer').appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 13000);
        }

        // Create hearts continuously
        setInterval(createHeart, 500);

        // Show response
        function showResponse() {
            document.getElementById('responseOverlay').classList.add('show');
        }

        function hideResponse() {
            document.getElementById('responseOverlay').classList.remove('show');
        }

        // Add some initial hearts
        for (let i = 0; i < 20; i++) {
            setTimeout(createHeart, i * 200);
        }
    </script>
</body>
</html>
